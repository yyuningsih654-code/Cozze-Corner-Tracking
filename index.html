<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lacak Laundry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .hidden-box { display: none; }
    </style>
</head>
<body class="bg-blue-50 p-5">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-black text-center text-blue-800 mb-6 uppercase">Lacak Cucian</h1>
        
        <div class="flex gap-2 mb-4">
            <input type="text" id="inputCek" placeholder="Kode Order..." class="flex-1 p-3 border-2 border-blue-200 rounded-xl outline-none uppercase font-bold text-sm">
            <button onclick="lacak()" class="bg-blue-600 text-white px-6 rounded-xl font-bold">CEK</button>
        </div>

        <button onclick="startScan()" class="w-full mb-6 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold border-2 border-dashed border-gray-300 uppercase text-xs">
            <i class="fas fa-qrcode mr-2"></i> Scan QR Nota
        </button>

        <div id="reader-container" class="hidden-box mb-4 overflow-hidden rounded-xl border-4 border-blue-600">
            <div id="reader"></div>
            <button onclick="stopScan()" class="w-full bg-red-500 text-white p-2 text-xs font-bold">TUTUP</button>
        </div>

        <div id="hasil" class="hidden-box border-t-2 pt-4 space-y-4">
            <div class="bg-blue-600 p-6 rounded-2xl text-white text-center shadow-lg">
                <p class="text-[10px] uppercase tracking-[0.2em] opacity-80 mb-1">Status Pesanan</p>
                <h2 id="resStatus" class="text-xl font-black italic uppercase text-yellow-300"></h2>
            </div>

            <div class="space-y-2 text-sm">
                <div class="flex justify-between border-b pb-2">
                    <span class="text-gray-400">Nama:</span>
                    <span id="resNama" class="font-bold uppercase text-blue-900"></span>
                </div>
                <div class="flex justify-between border-b pb-2">
                    <span class="text-gray-400">Layanan:</span>
                    <span id="resLayanan" class="font-bold"></span>
                </div>
                <div class="flex justify-between border-b pb-2">
                    <span class="text-gray-400">Berat:</span>
                    <span id="resBerat" class="font-bold"></span>
                </div>
                <div class="flex justify-between border-b pb-2">
                    <span class="text-gray-400">Total Harga:</span>
                    <span id="resHarga" class="font-bold text-green-600"></span>
                </div>
            </div>

            <div id="areaMotor" class="pt-10 pb-4 relative hidden-box">
                <div class="w-full h-1 bg-gray-200 rounded-full relative">
                    <div id="motor" class="absolute -top-7 transition-all duration-[2s] ease-in-out" style="left: 0%;">
                        <div class="flex flex-col items-center">
                            <i class="fas fa-motorcycle text-blue-600 text-2xl animate-float"></i>
                            <span class="text-[8px] font-bold text-blue-600 mt-1">KURIR</span>
                        </div>
                    </div>
                </div>
                <div class="flex justify-between text-[8px] font-black text-gray-400 mt-5 uppercase tracking-widest">
                    <span>Outlet</span>
                    <span>Rumah Anda</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://smart-laundry-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let html5QrCode;

        function lacak() {
            const code = document.getElementById('inputCek').value.toUpperCase().trim();
            if(!code) return;

            db.ref('orders/' + code).once('value').then((snapshot) => {
                const d = snapshot.val();
                if(!d) return alert("Kode tidak terdaftar!");

                document.getElementById('hasil').classList.remove('hidden-box');
                document.getElementById('resNama').innerText = d.nama;
                document.getElementById('resStatus').innerText = d.status;
                document.getElementById('resLayanan').innerText = d.layanan;
                document.getElementById('resBerat').innerText = d.berat + " Kg";
                document.getElementById('resHarga').innerText = "Rp " + d.harga;

                // LOGIKA MOTOR JALAN
                const areaMotor = document.getElementById('areaMotor');
                const motor = document.getElementById('motor');

                // Jika status mengandung kata "Antar" atau "Selesai/Sampai"
                if(d.status.includes("Antar") || d.status.includes("Sampai") || d.status.includes("Selesai")) {
                    areaMotor.classList.remove('hidden-box');
                    
                    if(d.status.includes("Diantar")) {
                        motor.style.left = "45%"; // Motor di tengah jalan
                    } else if(d.status.includes("Sampai") || d.status.includes("Selesai")) {
                        motor.style.left = "90%"; // Motor sampai tujuan
                    } else {
                        motor.style.left = "0%"; // Masih di outlet
                    }
                } else {
                    areaMotor.classList.add('hidden-box');
                }
            });
        }

        function startScan() {
            document.getElementById('reader-container').classList.remove('hidden-box');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                document.getElementById('inputCek').value = txt;
                lacak();
                stopScan();
            });
        }

        function stopScan() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader-container').classList.add('hidden-box');
                });
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Laundry Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hidden-box { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="p-6 max-w-md mx-auto flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-200">
                <i class="fas fa-microchip text-white text-xs"></i>
            </div>
            <div class="flex flex-col text-slate-800 font-extrabold tracking-tight">
                <span>SMART LAUNDRY</span>
                <span class="text-[8px] text-indigo-500 tracking-[0.2em] uppercase">Tracking System</span>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-6">
        <div class="mt-4 mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800">Halo, Pelanggan! <br><span class="text-indigo-600 italic italic">Cek Cucianmu.</span></h1>
        </div>

        <div class="glass p-2 rounded-[2rem] shadow-xl border border-white flex items-center mb-8">
            <button onclick="startScan()" class="bg-indigo-50 text-indigo-600 w-12 h-12 rounded-2xl flex items-center justify-center ml-1">
                <i class="fas fa-camera"></i>
            </button>
            <input type="text" id="inputCek" placeholder="Masukkan Kode..." class="flex-1 px-4 bg-transparent outline-none font-bold uppercase text-sm">
            <button onclick="lacak()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl shadow-lg flex items-center justify-center mr-1">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div id="reader-container" class="hidden-box mb-8 bg-white p-4 rounded-[2.5rem] shadow-2xl">
            <div id="reader" class="rounded-[2rem] overflow-hidden"></div>
            <button onclick="stopScan()" class="w-full mt-4 text-red-500 font-bold text-xs">BATAL</button>
        </div>

        <div id="main-menu" class="grid grid-cols-2 gap-4">
            <div onclick="document.getElementById('inputCek').focus()" class="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl cursor-pointer">
                <i class="fas fa-search-location text-2xl mb-4 opacity-80"></i>
                <p class="font-bold text-xs uppercase tracking-wider">LACAK<br>PESANAN</p>
            </div>
            <div onclick="alert('Daftar Harga:\n- Cuci Setrika: 7rb\n- Cuci Kering: 6rb')" class="bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm">
                <i class="fas fa-tags text-orange-400 text-2xl mb-4"></i>
                <p class="font-bold text-xs text-slate-600 uppercase tracking-wider">DAFTAR<br>HARGA</p>
            </div>
        </div>

        <div id="hasil" class="hidden-box mt-4 space-y-4">
            <div class="bg-white rounded-[2.5rem] shadow-2xl border border-gray-100 overflow-hidden">
                <div class="bg-indigo-600 p-8 text-center text-white">
                    <span class="text-[9px] font-bold uppercase tracking-[0.3em] opacity-60 italic">Status Pesanan</span>
                    <h2 id="resStatus" class="text-xl font-black italic uppercase mt-1 text-yellow-300"></h2>
                </div>
                <div class="p-8 space-y-4 text-sm font-semibold">
                    <div class="flex justify-between border-b pb-2"><span>Nama</span><span id="resNama" class="text-indigo-600 uppercase font-black"></span></div>
                    <div class="flex justify-between border-b pb-2"><span>Layanan</span><span id="resLayanan" class="font-bold"></span></div>
                    <div class="flex justify-between border-b pb-2"><span>Berat/Harga</span><span><span id="resBerat"></span>Kg - <span id="resHarga" class="text-green-600"></span></span></div>
                    
                    <div id="areaMotor" class="pt-10 relative hidden-box">
                        <div class="w-full h-1 bg-slate-100 rounded-full relative">
                            <div id="motor" class="absolute -top-7 transition-all duration-[2s]" style="left: 0%;">
                                <i class="fas fa-motorcycle text-indigo-600 text-xl animate-float"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <button onclick="location.reload()" class="w-full text-indigo-600 font-bold text-xs uppercase py-4">Kembali</button>
        </div>
    </main>

    <script>
        // PASTIKAN URL INI BENAR
        const firebaseConfig = { databaseURL: "https://smart-laundry-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let html5QrCode;

        function lacak() {
            const code = document.getElementById('inputCek').value.toUpperCase().trim();
            if(!code) return;

            console.log("Mencari ID:", code);

            db.ref('orders/' + code).once('value').then((snapshot) => {
                const d = snapshot.val();
                if(!d) {
                    alert("Kode " + code + " Belum Ada di Database!");
                    return;
                }

                // Munculkan hasil, sembunyikan menu
                document.getElementById('hasil').classList.remove('hidden-box');
                document.getElementById('main-menu').classList.add('hidden-box');
                
                document.getElementById('resNama').innerText = d.nama;
                document.getElementById('resStatus').innerText = d.status;
                document.getElementById('resLayanan').innerText = d.layanan;
                document.getElementById('resBerat').innerText = d.berat;
                document.getElementById('resHarga').innerText = "Rp " + d.harga;

                // Animasi Motor
                const areaMotor = document.getElementById('areaMotor');
                const motor = document.getElementById('motor');
                if(d.status.toLowerCase().includes("antar") || d.status.toLowerCase().includes("selesai")) {
                    areaMotor.classList.remove('hidden-box');
                    motor.style.left = d.status.toLowerCase().includes("selesai") ? "90%" : "45%";
                } else {
                    areaMotor.classList.add('hidden-box');
                }
            }).catch(e => alert("Error: " + e.message));
        }

        function startScan() {
            document.getElementById('reader-container').classList.remove('hidden-box');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                document.getElementById('inputCek').value = txt;
                lacak(); stopScan();
            });
        }
        function stopScan() {
            if(html5QrCode) { html5QrCode.stop().then(() => { document.getElementById('reader-container').classList.add('hidden-box'); }); }
        }
    </script>
</body>
</html>

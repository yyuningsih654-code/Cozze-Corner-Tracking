<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Laundry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h2 class="text-xl font-bold mb-4 text-blue-600 text-center">INPUT PESANAN LAUNDRY</h2>
        
        <div class="space-y-3">
            <input type="text" id="barcode" placeholder="ID Order (Contoh: BN001)" class="w-full p-2 border rounded">
            <input type="text" id="nama" placeholder="Nama Pelanggan" class="w-full p-2 border rounded">
            <input type="number" id="wa" placeholder="Nomor WA (628...)" class="w-full p-2 border rounded">
            
            <select id="layanan" class="w-full p-2 border rounded">
                <option value="Cuci Setrika">Cuci Setrika</option>
                <option value="Setrika Saja">Setrika Saja</option>
                <option value="Cuci Kering">Cuci Kering</option>
            </select>

            <div class="flex gap-2">
                <input type="number" id="berat" placeholder="Berat (Kg)" class="w-full p-2 border rounded">
                <input type="number" id="harga" placeholder="Total Harga" class="w-full p-2 border rounded">
            </div>

            <button onclick="simpanData()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">SIMPAN & BUAT QR</button>
        </div>

        <div id="hasil-qr" class="mt-5 text-center hidden">
            <div id="qrcode" class="flex justify-center mb-2"></div>
            <p id="info-id" class="font-bold text-lg"></p>
            <button onclick="location.reload()" class="text-sm text-gray-500 underline mt-2">Input Baru</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://smart-laundry-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function simpanData() {
            const id = document.getElementById('barcode').value.toUpperCase().trim();
            const data = {
                nama: document.getElementById('nama').value,
                wa: document.getElementById('wa').value,
                layanan: document.getElementById('layanan').value,
                berat: document.getElementById('berat').value,
                harga: document.getElementById('harga').value,
                status: "Diterima", // Status awal otomatis
                waktu: new Date().toLocaleString('id-ID')
            };

            if(!id || !data.nama) return alert("ID dan Nama jangan dikosongin!");

            // Simpan ke Cloud (Biar bisa dibuka di HP lain)
            db.ref('orders/' + id).set(data).then(() => {
                document.getElementById('hasil-qr').classList.remove('hidden');
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: id, width: 150, height: 150 });
                document.getElementById('info-id').innerText = id;
                alert("Data Berhasil Disimpan ke Database!");
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Smart Laundry Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <div class="flex items-center gap-3 mb-8">
            <div class="bg-indigo-600 p-3 rounded-2xl shadow-lg shadow-indigo-200 text-white">
                <i class="fas fa-user-shield"></i>
            </div>
            <div>
                <h1 class="font-black text-slate-800 text-xl tracking-tight">KASIR PANEL</h1>
                <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">Input Data Pelanggan</p>
            </div>
        </div>

        <div class="glass p-8 rounded-[2.5rem] shadow-xl border border-white space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">ID Order (Bebas)</label>
                <input type="text" id="barcode" placeholder="Contoh: BN001" class="w-full p-4 mt-1 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none font-bold uppercase">
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Nama Pelanggan</label>
                <input type="text" id="nama" class="w-full p-4 mt-1 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none font-semibold">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Berat (Kg)</label>
                    <input type="number" id="berat" class="w-full p-4 mt-1 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none font-semibold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Total Harga</label>
                    <input type="text" id="harga" placeholder="7000" class="w-full p-4 mt-1 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none font-semibold text-green-600">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Metode</label>
                <select id="metode" class="w-full p-4 mt-1 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none font-semibold">
                    <option>Ambil Sendiri</option>
                    <option>Antar Kurir</option>
                </select>
            </div>

            <button onclick="simpanData()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition active:scale-95 uppercase tracking-widest text-sm">
                <i class="fas fa-cloud-upload-alt mr-2"></i> Simpan ke Cloud
            </button>
        </div>

        <div id="hasil-qr" class="hidden mt-8 text-center animate-up">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl inline-block border-4 border-indigo-600">
                <div id="qrcode" class="mb-4"></div>
                <p id="info-teks" class="font-black text-indigo-600 text-lg uppercase"></p>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-2">Scan Nota Ini</p>
            </div>
            <button onclick="location.reload()" class="block w-full mt-4 text-slate-400 font-bold text-[10px] uppercase italic">Input Baru</button>
        </div>
    </div>

    <script>
        // 1. HUBUNGKAN KE FIREBASE
        const firebaseConfig = { databaseURL: "https://smart-laundry-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function simpanData() {
            const id = document.getElementById('barcode').value.toUpperCase().trim();
            const data = {
                nama: document.getElementById('nama').value,
                berat: document.getElementById('berat').value,
                harga: document.getElementById('harga').value,
                status: "Diterima Kasir", // Status default awal
                metode: document.getElementById('metode').value,
                waktu: new Date().toLocaleString('id-ID')
            };

            if(!id || !data.nama) return alert("ID dan Nama wajib diisi!");

            // 2. SIMPAN KE DATABASE ONLINE
            db.ref('orders/' + id).set(data).then(() => {
                // Tampilkan QR Code jika berhasil
                document.getElementById('hasil-qr').classList.remove('hidden');
                const areaQR = document.getElementById("qrcode");
                areaQR.innerHTML = ""; 
                new QRCode(areaQR, { text: id, width: 150, height: 150 });
                document.getElementById('info-teks').innerText = id;
                
                alert("Berhasil! Data " + id + " kini sudah online.");
            }).catch(err => {
                alert("Gagal simpan: " + err.message);
            });
        }
    </script>
</body>
</html>

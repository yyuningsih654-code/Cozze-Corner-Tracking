<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozee Hub - Realtime Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <!-- Library Firebase Cloud Resmi -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap");
        body { font-family: "Plus Jakarta Sans", sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- HEADER -->
        <header class="bg-white p-6 rounded-3xl shadow-sm mb-6 border border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">☕ Cozee Hub Monitor</h1>
                <p class="text-xs text-slate-400 mt-1">Real-time Tracker untuk Stand Pameran</p>
            </div>
            <div id="statusKoneksi" class="bg-amber-50 text-amber-600 text-[11px] font-bold px-4 py-1.5 rounded-full flex items-center gap-2 border border-amber-100">
                <i class="fas fa-spinner animate-spin"></i> Menghubungkan ke Cloud...
            </div>
        </header>

        <!-- GRID -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- KOLOM KIRI: KOPI -->
            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-base font-bold text-slate-800 mb-4">🛒 Antrean Pesanan Kopi</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-slate-100 text-[10px] text-slate-400 uppercase font-bold">
                                <th class="pb-3">Pelanggan</th>
                                <th class="pb-3">Menu</th>
                                <th class="pb-3">Status</th>
                            </tr>
                        </thead>
                        <tbody id="tabelKopi" class="text-xs text-slate-600 divide-y divide-slate-50">
                            <tr><td colspan="3" class="py-8 text-center text-slate-400 italic">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- KOLOM KANAN: ABSEN -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-base font-bold text-slate-800 mb-4">👋 Buku Tamu</h2>
                <div id="listBukuTamu" class="space-y-3 text-xs">
                    <p class="text-center text-slate-400 italic py-8">Memuat data tamu...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
       // URL Bersih tanpa tanda garis miring (/) di ujungnya
        const firebaseConfig = {
            databaseURL: "https://smart-laundry-tracking-89f97-default-rtdb.firebaseio.com"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.database();

        // Cek Koneksi
        db.ref(".info/connected").on("value", function(snapshot) {
            const statusBox = document.getElementById("statusKoneksi");
            if (snapshot.val() === true) {
                statusBox.innerHTML = '🟢 Terhubung ke Cloud';
                statusBox.className = "bg-emerald-50 text-emerald-600 text-[11px] font-bold px-4 py-1.5 rounded-full flex items-center gap-2 border border-emerald-100";
            } else {
                statusBox.innerHTML = '🔴 Terputus';
                statusBox.className = "bg-rose-50 text-rose-600 text-[11px] font-bold px-4 py-1.5 rounded-full flex items-center gap-2 border border-rose-100";
            }
        });

        // Ambil Data Kopi
        db.ref('pesanan_kopi').on('value', function(snapshot) {
            const tabel = document.getElementById('tabelKopi');
            if (!snapshot.exists()) {
                tabel.innerHTML = <tr><td colspan="3" class="py-8 text-center text-slate-400">Database kosong.</td></tr>;
                return;
            }
            tabel.innerHTML = ''; 
            snapshot.forEach(function(child) {
                const data = child.val();
                tabel.innerHTML += `
                    <tr class="border-b border-slate-50">
                        <td class="py-3 font-bold text-slate-800">${data.nama || 'Anonim'}</td>
                        <td class="py-3 font-semibold text-slate-600">${data.menu || '-'}</td>
                        <td class="py-3"><span class="px-2 py-0.5 rounded bg-amber-50 text-amber-700 font-bold text-[10px]">${data.status || 'Diproses'}</span></td>
                    </tr>`;
            });
        });

        // Ambil Buku Tamu
        db.ref('buku_tamu').on('value', function(snapshot) {
            const container = document.getElementById('listBukuTamu');
            if (!snapshot.exists()) {
                container.innerHTML = <p class="text-center text-slate-400 italic py-8">Belum ada tamu.</p>;
                return;
            }
            container.innerHTML = ''; 
            snapshot.forEach(function(child) {
                const data = child.val();
                container.innerHTML = `
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 mb-2">
                        <div class="flex justify-between font-bold text-slate-800"><span>${data.nama || 'Tamu'}</span> <span class="text-indigo-600">${data.asal || ''}</span></div>
                        <p class="text-slate-500 italic mt-1">"${data.kesan || '-'}"</p>
                    </div>` + container.innerHTML;
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozee Hub - Realtime Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap");
        body { font-family: "Plus Jakarta Sans", sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- HEADER -->
        <header class="bg-white p-6 rounded-3xl shadow-sm mb-6 border border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">☕ Cozee Hub Monitor</h1>
                <p class="text-xs text-slate-400 mt-1">Real-time Tracker untuk Stand Pameran</p>
            </div>
            <div id="statusKoneksi" class="bg-emerald-50 text-emerald-600 text-[11px] font-bold px-4 py-1.5 rounded-full flex items-center gap-2 border border-emerald-100">
                🟢 Terhubung via REST API
            </div>
        </header>

        <!-- GRID -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- ANTREAN KOPI -->
            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base font-bold text-slate-800">🛒 Antrean Pesanan Kopi</h2>
                    <button onclick="muatDataKopi()" class="text-xs bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg font-bold hover:bg-indigo-100">🔄 Refresh Data</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-slate-100 text-[10px] text-slate-400 uppercase font-bold">
                                <th class="pb-3">Waktu / Kelas</th>
                                <th class="pb-3">Nama Pelanggan</th>
                                <th class="pb-3">Menu Pesanan</th>
                                <th class="pb-3">Bayar</th>
                                <th class="pb-3">Status</th>
                            </tr>
                        </thead>
                        <tbody id="tabelKopi" class="text-xs text-slate-600 divide-y divide-slate-50">
                            <tr><td colspan="5" class="py-8 text-center text-slate-400 italic">Memuat data pesanan...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- BUKU TAMU -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-base font-bold text-slate-800 mb-4">👋 Buku Tamu</h2>
                <div id="listBukuTamu" class="space-y-3 text-xs">
                    <p class="text-center text-slate-400 italic py-8">Memuat data tamu...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlKopi = "https://smart-laundry-tracking-89f97-default-rtdb.firebaseio.com/pesanan_kopi.json";
        const urlTamu = "https://smart-laundry-tracking-89f97-default-rtdb.firebaseio.com/buku_tamu.json";

        function muatDataKopi() {
            fetch(urlKopi)
                .then(response => response.json())
                .then(data => {
                    const tabel = document.getElementById('tabelKopi');
                    if (!data) {
                        tabel.innerHTML = <tr><td colspan="5" class="py-8 text-center text-slate-400">Belum ada pesanan masuk.</td></tr>;
                        return;
                    }
                    tabel.innerHTML = '';
                    
                    // PERBAIKAN UTAMA: Menggunakan FOR...IN untuk membongkar ID unik Firebase secara paksa
                    for (const key in data) {
                        if (data.hasOwnProperty(key)) {
                            const item = data[key];
                            tabel.innerHTML += `
                                <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition">
                                    <td class="py-3 text-slate-400 font-medium">${item.waktu || '--.--'} <span class="text-indigo-500 font-bold ml-1">[${item.kelas || '-'}]</span></td>
                                    <td class="py-3 font-bold text-slate-800">${item.nama || 'Anonim'}</td>
                                    <td class="py-3 font-semibold text-slate-600">${item.menu || '-'}</td>
                                    <td class="py-3 text-slate-500">${item.pembayaran || '-'}</td>
                                    <td class="py-3"><span class="font-bold text-[11px] text-slate-700">${item.status || '⏳ Diproses'}</span></td>
                                </tr>`;
                        }
                    }
                })
                .catch(error => {
                    document.getElementById('tabelKopi').innerHTML = <tr><td colspan="5" class="py-8 text-center text-rose-500">Gagal memuat data. Periksa koneksi internet.</td></tr>;
                });
        }

        function muatDataTamu() {
            fetch(urlTamu)
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('listBukuTamu');
                    if (!data) {
                        container.innerHTML = <p class="text-center text-slate-400 italic py-8">Belum ada tamu yang mengisi.</p>;
                        return;
                    }
                    container.innerHTML = '';
                    
                    for (const key in data) {
                        if (data.hasOwnProperty(key)) {
                            const item = data[key];
                            container.innerHTML = `
                                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 mb-2">
                                    <div class="flex justify-between font-bold text-slate-800"><span>${item.nama || 'Tamu'}</span></div>
                                    <p class="text-slate-500 italic mt-1">"${item.menu || item.kesan || '-'}"</p>
                                </div>` + container.innerHTML;
                        }
                    }
                });
        }

        // Jalankan otomatis saat web dibuka
        muatDataKopi();
        muatDataTamu();

        // Auto-refresh 5 detik
        setInterval(() => {
            muatDataKopi();
            muatDataTamu();
        }, 5000);
    </script>
</body>
</html>

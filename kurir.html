!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurir Panel - Smart Laundry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hidden-box { display: none !important; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="p-6 max-w-md mx-auto flex items-center gap-2">
        <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-200">
            <i class="fas fa-motorcycle text-white text-xs"></i>
        </div>
        <div class="flex flex-col">
            <span class="font-extrabold text-slate-800 tracking-tight">KURIR PANEL</span>
            <span class="text-[8px] font-bold text-indigo-500 tracking-widest uppercase">Delivery Update</span>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-6">
        <div id="scan-init" class="space-y-4 mt-4">
            <button onclick="startScan()" class="w-full bg-indigo-600 text-white p-8 rounded-[2.5rem] shadow-xl shadow-indigo-100 flex flex-col items-center gap-4 active:scale-95 transition">
                <i class="fas fa-qrcode text-4xl"></i>
                <span class="font-bold text-xs uppercase tracking-[0.2em]">Scan Nota Sekarang</span>
            </button>
            <p class="text-center text-[10px] text-slate-400 font-bold uppercase tracking-widest">Gunakan kamera untuk update cepat</p>
        </div>

        <div id="reader-container" class="hidden-box mt-4">
            <div class="bg-white p-4 rounded-[2.5rem] shadow-2xl border border-gray-100">
                <div id="reader" class="rounded-[2rem] overflow-hidden border"></div>
                <button onclick="stopScan()" class="w-full mt-4 text-red-500 font-bold text-xs uppercase py-2">Batal Scan</button>
            </div>
        </div>

        <div id="update-status-area" class="hidden-box mt-4 space-y-4">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-white text-center">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Update Untuk ID:</span>
                <h2 id="id-display" class="text-3xl font-black text-indigo-600 italic my-2"></h2>
                <p id="nama-display" class="text-sm font-bold text-slate-700 uppercase mb-6"></p>

                <div class="grid grid-cols-1 gap-3">
                    <button onclick="kirimUpdate('Sedang Diantar')" class="w-full bg-slate-800 text-white py-5 rounded-2xl font-bold text-[10px] uppercase tracking-widest shadow-lg flex items-center justify-center gap-3">
                        <i class="fas fa-shipping-fast"></i> Mulai Antar
                    </button>
                    <button onclick="kirimUpdate('Selesai / Sampai')" class="w-full bg-green-500 text-white py-5 rounded-2xl font-bold text-[10px] uppercase tracking-widest shadow-lg flex items-center justify-center gap-3">
                        <i class="fas fa-check-double"></i> Sudah Sampai
                    </button>
                </div>
            </div>
            <button onclick="location.reload()" class="w-full text-indigo-600 font-bold text-[10px] uppercase tracking-widest py-4 italic underline">Selesai / Scan Lagi</button>
        </div>
    </main>

    <script>
        const firebaseConfig = { databaseURL: "https://smart-laundry-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let html5QrCode;
        let idAktif = "";

        function startScan() {
            document.getElementById('scan-init').classList.add('hidden-box');
            document.getElementById('reader-container').classList.remove('hidden-box');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                prosesData(txt);
                stopScan();
            });
        }

        function stopScan() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader-container').classList.add('hidden-box');
                });
            }
        }

        function prosesData(id) {
            idAktif = id.toUpperCase().trim();
            db.ref('orders/' + idAktif).once('value').then(s => {
                const d = s.val();
                if(!d) return alert("Data ID " + idAktif + " Gak ada!");

                document.getElementById('update-status-area').classList.remove('hidden-box');
                document.getElementById('id-display').innerText = idAktif;
                document.getElementById('nama-display').innerText = d.nama;
            });
        }

        function kirimUpdate(statusBaru) {
            if(!idAktif) return;
            db.ref('orders/' + idAktif).update({ status: statusBaru }).then(() => {
                alert("Status Berhasil Diperbarui!");
            }).catch(e => alert("Gagal update cloud!"));
        }
    </script>
</body>
</html>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kurir - BN Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  </head>
  <body class="bg-yellow-50 p-4">
    <div
      class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-yellow-200"
    >
      <div class="bg-yellow-500 p-8 text-white text-center font-black">
        <i class="fas fa-truck text-3xl mb-3"></i><br />
        <span class="uppercase tracking-widest italic">Panel Kurir BN</span>
      </div>

      <div class="p-6">
        <div
          id="reader"
          class="rounded-3xl overflow-hidden mb-4 bg-gray-100"
        ></div>

        <button
          id="btnStart"
          onclick="mulaiScan()"
          class="w-full bg-yellow-100 text-yellow-700 py-5 rounded-3xl font-black border-2 border-dashed border-yellow-300 mb-4 transition active:scale-95"
        >
          <i class="fas fa-qrcode mr-2"></i> SCAN PAKET ANTAR
        </button>

        <div id="info" class="hidden space-y-4 pt-4 border-t border-slate-100">
          <div class="bg-blue-50 p-4 rounded-2xl">
            <p class="text-[9px] text-blue-400 font-bold uppercase">
              Tujuan Pengantaran:
            </p>
            <p id="knama" class="font-black text-gray-800 text-lg uppercase">
              -
            </p>
          </div>

          <button
            onclick="update('Sedang Diantar 🚚')"
            class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold shadow-lg shadow-blue-100"
          >
            KONFIRMASI OTW
          </button>
          <button
            onclick="update('Selesai ✅')"
            class="w-full bg-green-600 text-white py-5 rounded-2xl font-bold shadow-lg shadow-green-100"
          >
            KONFIRMASI SAMPAI
          </button>
          <button
            onclick="location.reload()"
            class="w-full text-gray-400 text-[10px] font-bold mt-2 uppercase"
          >
            Batal / Scan Lagi
          </button>
        </div>
      </div>
    </div>

    <script>
      // KONFIGURASI FIREBASE (Otomatis nyambung ke satelit database kamu)
      const conf = {
          databaseURL: "https://smart-laundry-tracking-89f97-default-rtdb.firebaseio.com/"
      };
      
      firebase.initializeApp(conf);
      const db = firebase.database();

      let scanner;
      let idAktif = "";

      function mulaiScan() {
        const btn = document.getElementById("btnStart");
        btn.innerText = "Membuka Kamera... (Tunggu)";
        btn.classList.add("opacity-50");

        scanner = new Html5Qrcode("reader");

        Html5Qrcode.getCameras()
          .then((devices) => {
            if (devices && devices.length) {
              let cameraId = devices[devices.length - 1].id; // Pakai kamera belakang
              scanner
                .start(cameraId, { fps: 10, qrbox: 250 }, (decodedText) => {
                  idAktif = decodedText.toUpperCase().trim();
                  
                  // Sekarang nyari data orderannya langsung ke Cloud Firebase
                  db.ref('orders/' + idAktif).once('value').then((snapshot) => {
                    if (!snapshot.exists()) {
                      alert("ID " + idAktif + " Tidak Terdaftar di Cloud!");
                      location.reload();
                      return;
                    }
                    const data = snapshot.val();
                    document.getElementById("info").classList.remove("hidden");
                    document.getElementById("knama").innerText = data.nama;
                    scanner.stop();
                    document.getElementById("reader").style.display = "none";
                  }).catch((err) => {
                    alert("Gagal memuat data cloud: " + err.message);
                  });

                })
                .catch((err) => {
                  alert("Error Scanner: " + err);
                  btn.innerText = "SCAN PAKET ANTAR";
                  btn.classList.remove("opacity-50");
                });
            }
          })
          .catch((err) => {
            alert("Kamera tidak ditemukan atau izin ditolak!");
            btn.innerText = "SCAN PAKET ANTAR";
            btn.classList.remove("opacity-50");
          });
      }

      function update(statusBaru) {
        if (!idAktif) return;
        
        // Ambil data lama dulu dari Firebase, ganti statusnya, lalu simpan kembali ke Firebase
        db.ref('orders/' + idAktif).once('value').then((snapshot) => {
          if (snapshot.exists()) {
            let data = snapshot.val();
            data.status = statusBaru;
            data.waktu = new Date().toLocaleString("id-ID");
            
            return db.ref('orders/' + idAktif).set(data);
          }
        }).then(() => {
          alert("Status Update Berhasil ke Cloud!");
          location.reload();
        }).catch((error) => {
          alert("Gagal update status: " + error.message);
        });
      }
    </script>
  </body>
</html>

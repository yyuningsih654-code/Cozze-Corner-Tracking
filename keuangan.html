<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cozee Corner | Live Dashboard Keuangan</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap");
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Fredoka", sans-serif;
        background-color: #faf5ff;
        color: #3b0764;
        padding: 20px;
      }
      .container {
        max-width: 500px;
        margin: 0 auto;
      }
      .header {
        text-align: center;
        margin-bottom: 20px;
        background: #ffffff;
        padding: 16px;
        border-radius: 24px;
        border: 4px solid #7c3aed;
        box-shadow: 0 6px 0 #7c3aed;
      }
      .box-stat {
        background: #f3e8ff;
        border: 3px solid #7c3aed;
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        margin-bottom: 16px;
        box-shadow: 0 5px 0 #7c3aed;
      }
      .grid-dua {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 16px;
      }
      .mini-box {
        background: #ffffff;
        border: 3px solid #3b0764;
        border-radius: 16px;
        padding: 12px;
        text-align: center;
        box-shadow: 0 4px 0 #3b0764;
      }
      .log-box {
        background: white;
        border: 3px solid #7c3aed;
        border-radius: 20px;
        padding: 16px;
        box-shadow: 0 6px 0 #7c3aed;
      }
      .log-item {
        padding: 8px 0;
        border-bottom: 1px dashed #cbd5e1;
        font-size: 13px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1 style="font-size: 20px; color: #7c3aed">
          <i class="fas fa-chart-pie"></i> Cozee Finance Live
        </h1>
        <p style="font-size: 12px; color: #64748b; font-weight: 600">
          Data Keuangan Real-time Stand
        </p>
      </div>

      <div class="box-stat">
        <span
          style="
            font-size: 12px;
            color: #6b21a8;
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
          "
          >💰 TOTAL OMSET / PENDAPATAN KOTOR</span
        >
        <h2
          id="keuOmset"
          style="font-size: 32px; color: #16a34a; font-weight: 700"
        >
          Rp0
        </h2>
      </div>

      <div class="grid-dua">
        <div class="mini-box">
          <span
            style="
              font-size: 11px;
              color: #64748b;
              display: block;
              font-weight: 700;
            "
            >📦 Total Orderan</span
          >
          <strong id="keuTotalNota" style="font-size: 18px">0 Transaksi</strong>
        </div>
        <div
          class="mini-box"
          style="
            background: #eff6ff;
            border-color: #2563eb;
            box-shadow: 0 4px 0 #2563eb;
          "
        >
          <span
            style="
              font-size: 11px;
              color: #1e40af;
              display: block;
              font-weight: 700;
            "
            >💳 Total QRIS</span
          >
          <strong id="keuQris" style="font-size: 18px; color: #2563eb"
            >Rp0</strong
          >
        </div>
      </div>

      <div class="log-box">
        <h3 style="font-size: 14px; margin-bottom: 10px; color: #7c3aed">
          <i class="fas fa-history"></i> Log Aliran Transaksi
        </h3>
        <div id="keuLogDaftar" style="max-height: 250px; overflow-y: auto">
          Memuat data...
        </div>
      </div>
    </div>

    <script>
      const configFirebase = {
        databaseURL:
          "https://smart-laundry-tracking-89f97-default-rtdb.firebaseio.com/",
      };
      firebase.initializeApp(configFirebase);
      const db = firebase.database();

      // Membaca data pesanan secara live untuk analisis keuangan
      db.ref("pesanan_kopi").on("value", (snapshot) => {
        let totalOmset = 0;
        let totalNota = 0;
        let totalQris = 0;
        let logHtml = "";

        snapshot.forEach((child) => {
          const data = child.val();
          totalNota++;
          let nilaiBayar = parseInt(data.total_bayar) || 0;
          totalOmset += nilaiBayar;

          if (data.pembayaran === "QRIS") {
            totalQris += nilaiBayar;
          }

          logHtml =
            `
            <div class="log-item">
              <span style="color:#64748b;">[${data.waktu || "--:--"}]</span> 
              <strong>${data.nama}</strong> (${data.kelas}) 
              <span style="float:right; color:#16a34a;">+Rp${nilaiBayar.toLocaleString("id-ID")} (${data.pembayaran})</span>
            </div>
          ` + logHtml;
        });

        document.getElementById("keuOmset").innerText =
          "Rp " + totalOmset.toLocaleString("id-ID");
        document.getElementById("keuTotalNota").innerText =
          totalNota + " Transaksi";
        document.getElementById("keuQris").innerText =
          "Rp " + totalQris.toLocaleString("id-ID");
        document.getElementById("keuLogDaftar").innerHTML =
          logHtml ||
          "<p style='color:#94a3b8; text-align:center;'>Belum ada transaksi.</p>";
      });
    </script>
  </body>
</html>

  .v-btn-grey { background-color: #e2e8f0; color: #3b0764; box-shadow: 0 3px 0 #3b0764; font-size: 12px;}
</style>

<script>
  let vStream = null;
  let vCounter = 1;
  const vImagesStore = [];

  async function bukaVKamera() {
    const video = document.getElementById('v-video');
    const overlay = document.getElementById('v-overlay-text');
    
    try {
      vStream = await navigator.mediaDevices.getUserMedia({ 
        // Meminta resolusi kamera standar
        video: { width: 640, height: 480, facingMode: "user" }, 
        audio: false 
      });
      
      video.srcObject = vStream;
      overlay.style.display = 'none';
      
      document.getElementById('btn-v-start').style.display = 'none';
      const snapBtn = document.getElementById('btn-v-snap');
      snapBtn.style.display = 'block';
      snapBtn.innerText = `JEPRET FOTO ${vCounter}/3 ⚡`;
    } catch (err) {
      alert("Akses kamera gagal, tolong izinkan di browser ya! 😭");
    }
  }

  function jepretVFoto() {
    if (vCounter > 3) return;

    const video = document.getElementById('v-video');
    const canvas = document.getElementById(`v-canvas-${vCounter}`);
    const ctx = canvas.getContext('2d');

    // --- LOGIC ANTI-LONJONG: CANVAS DIBUAT KOTAK SEMPURNA ---
    canvas.width = 400; // Ukuran resolusi internal foto (Kotak)
    canvas.height = 400;

    // --- LOGIC POTONG GAMBAR KAMERA LEBAR JADI KOTAK DI TENGAH ---
    // Video aslinya lebar (misal 640x480), kita mau ambil 480x480 di tengah.
    
    // 1. Tentukan ukuran video input asli
    let videoW = video.videoWidth;
    let videoH = video.videoHeight;
    
    // 2. Tentukan ukuran kotak potong terkecil (sesuai tinggi video)
    let cropSize = videoH; 
    
    // 3. Tentukan koordinat X mulai motong di video agar di tengah
    let startX = (videoW - videoH) / 2;

    // --- LOGIC ANTI-MIRROR PAS DISIMPAN ---
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1); // Balik sumbu horizontal
    
    // Gambar potongan video (KOTAK) ke canvas (KOTAK)
    ctx.drawImage(
      video,       // Sumber: Video
      startX, 0,    // Sumber: Koordinat potong mulai X, Y
      cropSize, cropSize, // Sumber: Ukuran potong lebar, tinggi (Kotak)
      0, 0,        // Canvas: Koordinat gambar mulai X, Y
      canvas.width, canvas.height // Canvas: Ukuran gambar lebar, tinggi (Kotak)
    );
    
    // Reset transformasi kembali normal
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    // Simpan data base64 foto
    vImagesStore.push(canvas.toDataURL('image/png'));
    vCounter++;

    if (vCounter <= 3) {
      document.getElementById('btn-v-snap').innerText = `JEPRET FOTO ${vCounter}/3 ⚡`;
    } else {
      // Selesai jepret 3 kali, matikan kamera
      if (vStream) {
        vStream.getTracks().forEach(track => track.stop());
      }
      video.srcObject = null;
      document.getElementById('btn-v-snap').style.display = 'none';
      document.getElementById('btn-v-save').style.display = 'block';
      document.getElementById('btn-v-reset').style.display = 'block';
    }
  }

  function unduhVStrip() {
    const finalCanvas = document.getElementById('v-final-hidden-canvas');
    const ctx = finalCanvas.getContext('2d');

    // Canvas panjang memanjang vertikal
    finalCanvas.width = 360;
    finalCanvas.height = 1450; 

    // Background ungu tua Cozee Corner
    ctx.fillStyle = "#3b0764";
    ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

    // Judul Header foto
    ctx.fillStyle = "#fef08a";
    ctx.font = "bold 24px 'Fredoka', sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("COZEE CORNER", finalCanvas.width / 2, 60);

    ctx.fillStyle = "#ffe4e6";
    ctx.font = "italic 15px 'Fredoka', sans-serif";
    ctx.fillText("sip, bite & relax", finalCanvas.width / 2, 90);

    let imagesLoaded = 0;
    const imgs = [];

    for (let i = 0; i < 3; i++) {
      const img = new Image();
      img.src = vImagesStore[i];
      imgs.push(img);

      img.onload = function() {
        imagesLoaded++;
        if (imagesLoaded === 3) {
          let currentY = 130;
          
          imgs.forEach((loadedImg) => {
            // Gambar Frame Putih Kotak Polaroid Strip
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(30, currentY, 300, 400); 
            
            // Gambar foto Kotak (No-Mirror) lurus ga lonjong
            ctx.drawImage(loadedImg, 40, currentY + 10, 280, 280);
            
            currentY += 410; // Turun ke kotak berikutnya
          });

          // Teks Footer Nama Geng
          ctx.fillStyle = "#ffe4e6";
          ctx.font = "bold 11px 'Fredoka', sans-serif";
          ctx.fillText("mahmud • yuni • dyon • anjelina • lutfi • pradhita", finalCanvas.width / 2, finalCanvas.height - 40);

          // Jalankan download file otomatis
          const dl = document.createElement('a');
          dl.download = 'cozee-photostrip- square.png';
          dl.href = finalCanvas.toDataURL('image/png');
          dl.click();
        }
      };
    }
  }

  function resetVApp() {
    vCounter = 1;
    vImagesStore.length = 0;
    document.getElementById('btn-v-save').style.display = 'none';
    document.getElementById('btn-v-reset').style.display = 'none';
    document.getElementById('btn-v-start').style.display = 'block';
    document.getElementById('v-overlay-text').style.display = 'block';

    for (let i = 1; i <= 3; i++) {
      const canvas = document.getElementById(`v-canvas-${i}`);
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
</script>

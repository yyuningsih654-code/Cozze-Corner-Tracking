<canvas id="final-canvas" style="display:none;"></canvas>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');

    /* Warna border & teks utama diganti Biru Gelap Estetik, bukan ungu lagi */
    :root {
        --cozee-blue-border: #0284c7; /* Biru tegas untuk border */
        --cozee-blue-bg: #bae6fd;     /* Biru langit pastel untuk strip */
        --cozee-text: #0369a1;        /* Biru tua untuk tulisan */
    }

    .pb-wrapper {
        width: 100%;
        min-height: 100vh;
        background-image: linear-gradient(to bottom, #93c5fd, #cffafe); /* Gradasi Biru Langit Web Kamu */
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px 10px;
        font-family: 'Fredoka', sans-serif;
    }

    .pb-main-card {
        background: white;
        width: 100%;
        max-width: 380px;
        border: 4px solid var(--cozee-blue-border);
        border-radius: 35px;
        padding: 20px;
        box-shadow: 0 10px 0px rgba(2, 132, 199, 0.15);
    }

    .pb-top-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }

    .pb-badge {
        background: #fb7185; /* Pink pastel button accent */
        color: white;
        padding: 5px 12px;
        border: 3px solid var(--cozee-blue-border);
        border-radius: 12px;
        font-size: 11px;
    }

    .pb-slogan-top {
        font-size: 11px;
        color: var(--cozee-text);
        font-style: italic;
        font-weight: 700;
    }

    /* Monitor Kamera Square (Warna Biru) */
    .pb-camera-window {
        width: 100%;
        padding-top: 100%; 
        position: relative;
        background: #0c4a6e; /* Background kamera sebelum aktif */
        border: 4px solid var(--cozee-blue-border);
        border-radius: 20px;
        overflow: hidden;
        margin-bottom: 20px;
    }

    #pb-video {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover; /* Wajah anti-lonjong */
        transform: scaleX(-1); /* Efek cermin pas ngaca */
    }

    .pb-blink {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        color: #fef08a; font-size: 12px; text-align: center;
    }

    .pb-decor-corner {
        position: absolute; top: 10px; right: 10px; font-size: 20px; z-index: 5;
    }

    /* --- STRIP PREVIEW VERTIKAL WARNA BIRU --- */
    .pb-strip-preview {
        background: var(--cozee-blue-bg); /* Bingkai Full Biru Muda */
        border: 4px solid var(--cozee-blue-border);
        border-radius: 24px;
        padding: 18px 14px;
        box-shadow: 0 6px 0 rgba(2, 132, 199, 0.1);
    }

    .pb-strip-inner {
        display: flex;
        flex-direction: column;
        gap: 12px;
        text-align: center;
    }

    .strip-brand h3 { 
        margin: 0; 
        font-size: 22px; 
        color: var(--cozee-text);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .strip-brand p { 
        margin: 2px 0 0 0; 
        font-size: 11px; 
        color: #e11d48; /* Warna rose pink cerah untuk slogan */
        font-style: italic; 
        font-weight: 700; 
    }

    .strip-frame {
        background: white;
        padding: 8px;
        border: 2px solid var(--cozee-blue-border);
        border-radius: 12px;
        box-shadow: 0 3px 0 var(--cozee-blue-border);
    }

    .strip-frame canvas {
        width: 100%;
        aspect-ratio: 1/1; /* Kotak Sempurna */
        background: #f0f9ff;
        border-radius: 6px;
        display: block;
    }

    /* Footer text pengganti nama geng */
    .strip-footer-text {
        font-size: 10px;
        color: var(--cozee-text);
        font-weight: 700;
        opacity: 0.8;
        margin-top: 4px;
    }

    /* Buttons Bubble Style (Matching) */
    .pb-btn-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
    }

    .pb-btn {
        border: 3px solid var(--cozee-blue-border);
        padding: 12px;
        border-radius: 20px;
        font-family: 'Fredoka', sans-serif;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        transition: 0.05s;
    }

    .pb-btn:active { transform: translateY(4px); box-shadow: 0 0px 0 var(--cozee-blue-border) !important; }

    .btn-blue-sky { background: #bae6fd; color: var(--cozee-text); box-shadow: 0 4px 0 var(--cozee-blue-border); }
    .btn-red { background: #f43f5e; color: white; box-shadow: 0 4px 0 var(--cozee-blue-border); }
    .btn-yellow { background: #fef08a; color: var(--cozee-text); box-shadow: 0 4px 0 var(--cozee-blue-border); }
    .btn-grey { background: #e2e8f0; color: #64748b; border-radius: 12px; padding: 8px; font-size: 11px; border: 2px solid #cbd5e1;}

</style>

<script>
    let stream = null;
    let counter = 1;
    let photos = [];

    async function startKamera() {
        const video = document.getElementById('pb-video');
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { width: 500, height: 500 }, audio: false });
            video.srcObject = stream;
            document.getElementById('pb-hint').style.display = 'none';
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-snap').style.display = 'block';
            document.getElementById('btn-snap').innerText = `JEPRET FOTO 1/3 ⚡`;
        } catch (e) { alert("Akses kamera ditolak atau tidak tersedia!"); }
    }

    function ambilFoto() {
        if (counter > 3) return;

        const video = document.getElementById('pb-video');
        const canvas = document.getElementById(`c${counter}`);
        const ctx = canvas.getContext('2d');

        canvas.width = 500;
        canvas.height = 500;

        // Proses Anti Mirror pada hasil simpanan
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        
        // Ambil potongan tengah video biar ga lonjong
        const size = Math.min(video.videoWidth, video.videoHeight);
        const startX = (video.videoWidth - size) / 2;
        const startY = (video.videoHeight - size) / 2;

        ctx.drawImage(video, startX, startY, size, size, 0, 0, canvas.width, canvas.height);
        
        photos.push(canvas.toDataURL('image/png'));
        counter++;

        if (counter <= 3) {
            document.getElementById('btn-snap').innerText = `JEPRET FOTO ${counter}/3 ⚡`;
        } else {
            document.getElementById('btn-snap').style.display = 'none';
            document.getElementById('btn-save').style.display = 'block';
            document.getElementById('btn-reset').style.display = 'block';
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
        }
    }

    function downloadStrip() {
        const final = document.getElementById('final-canvas');
        const ctx = final.getContext('2d');

        final.width = 400;
        final.height = 1450;

        // Background Strip Mengikuti Request (Biru Pastel)
        ctx.fillStyle = "#bae6fd";
        ctx.fillRect(0, 0, final.width, final.height);

        // Border luar keliling strip foto hasil download
        ctx.strokeStyle = "#0284c7";
        ctx.lineWidth = 10;
        ctx.strokeRect(0, 0, final.width, final.height);

        // Header Teks Hasil Download (Cozee Corner)
        ctx.fillStyle = "#0369a1";
        ctx.font = "bold 28px 'Fredoka', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("COZEE CORNER", 200, 65);
        
        ctx.fillStyle = "#e11d48";
        ctx.font = "italic bold 15px 'Fredoka', sans-serif";
        ctx.fillText("sip, bite & relax", 200, 95);

        let y = 130;
        let loaded = 0;
        photos.forEach((p, i) => {
            const img = new Image();
            img.src = p;
            img.onload = () => {
                // Background Polaroid frame putih per foto
                ctx.fillStyle = "white";
                ctx.fillRect(35, y, 330, 390); 
                
                // Gambar foto lurus
                ctx.drawImage(img, 45, y+10, 310, 310);
                
                // Border tipis biru buat per frame foto biar makin pop-out
                ctx.strokeStyle = "#0284c7";
                ctx.lineWidth = 3;
                ctx.strokeRect(35, y, 330, 390);

                y += 415;
                loaded++;
                
                if (loaded === 3) {
                    // Teks Footer hasil download (bukan nama geng)
                    ctx.fillStyle = "#0369a1";
                    ctx.font = "bold 11px 'Fredoka', sans-serif";
                    ctx.fillText("✨ captured at cozee corner ✨", 200, final.height - 35);

                    const link = document.createElement('a');
                    link.download = 'cozee-corner-photostrip.png';
                    link.href = final.toDataURL();
                    link.click();
                }
            }
        });
    }

    function resetApp() {
        location.reload();
    }
</script>

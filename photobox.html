<div class="cozee-vertical-section">
  <div class="cozee-vertical-container">
    
    <div class="vertical-brand-header">
      <span class="v-brand-badge">☕ COZEE CORNER</span>
      <span class="v-brand-slogan">sip, bite & relax</span>
    </div>

    <div class="vertical-camera-monitor">
      <video id="v-video" autoplay playsinline></video>
      <div id="v-overlay-text" class="v-blink">SAY CHEESE! KAMERA BELUM AKTIF</div>
    </div>

    <div class="cozee-real-photostrip">
      
      <div class="strip-inner-title">
        <h3>Cozee Corner</h3>
        <p>sip, bite & relax</p>
      </div>

      <div class="v-frame v-color-pink">
        <div class="v-slot-inside">
          <canvas id="v-canvas-1"></canvas>
          <span class="v-number">01</span>
        </div>
      </div>

      <div class="v-frame v-color-orange">
        <div class="v-slot-inside">
          <canvas id="v-canvas-2"></canvas>
          <span class="v-number">02</span>
        </div>
      </div>

      <div class="v-frame v-color-green">
        <div class="v-slot-inside">
          <canvas id="v-canvas-3"></canvas>
          <span class="v-number">03</span>
        </div>
      </div>

      <div class="v-strip-footer">
        <p>mahmud • yuni • dyon • anjelina • lutfi • pradhita</p>
      </div>

    </div>

    <div class="v-action-area">
      <button id="btn-v-start" class="v-bubble-btn v-btn-blue" onclick="bukaVKamera()">BUKA KAMERA 🎥</button>
      <button id="btn-v-snap" class="v-bubble-btn v-btn-red" onclick="jepretVFoto()" style="display: none;">JEPRET FOTO (0/3) ⚡</button>
      <button id="btn-v-save" class="v-bubble-btn v-btn-yellow" onclick="unduhVStrip()" style="display: none;">SIMPAN STRIP FOTO 💾</button>
      <button id="btn-v-reset" class="v-bubble-btn v-btn-grey" onclick="resetVApp()" style="display: none;">ULANGI FOTO 🔄</button>
    </div>

  </div>
</div>

<canvas id="v-final-hidden-canvas" style="display: none;"></canvas>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');

    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px 12px;
    box-sizing: border-box;
  }

  /* Kotak Container Utama Web */
  .cozee-vertical-container {
    background-color: #ffffff;
    border: 4px solid #3b0764;
    border-radius: 32px;
    padding: 20px;
    width: 100%;
    max-width: 380px; /* Lebar pas untuk HP dan bentuk strip */
    box-shadow: 0 12px 0px rgba(59, 7, 100, 0.2);
    box-sizing: border-box;
  }

  .vertical-brand-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .v-brand-badge {
    background: #ffffff;
    color: #3b0764;
    border: 3px solid #3b0764;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    box-shadow: 0 4px 0 #3b0764;
  }

  .v-brand-slogan {
    font-size: 11px;
    color: #3b0764;
    font-style: italic;
    font-weight: 700;
  }

  /* Monitor Jendela Kamera Live */
  .vertical-camera-monitor {
    width: 100%;
    height: 200px;
    background-color: #1e1b4b;
    border: 4px solid #3b0764;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    margin-bottom: 15px;
    box-shadow: 0 5px 0 rgba(59, 7, 100, 0.15);
  }

  #v-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* Efek kaca cermin pas ngaca live */
  }

  .v-blink {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fef08a;
    font-size: 12px;
    text-align: center;
    font-weight: 700;
  }

  /* TAMPILAN 3 STRIP FOTO MEMANJANG KE BAWAH (VERTIKAL) */
  .cozee-real-photostrip {
    background-color: #ffffff;
    border: 4px solid #3b0764;
    border-radius: 24px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 18px;
    box-shadow: 0 6px 0 rgba(59, 7, 100, 0.1);
  }

  .strip-inner-title {
    text-align: center;
    margin-bottom: 2px;
  }

  .strip-inner-title h3 {
    margin: 0;

  }

  .strip-inner-title p {
    margin: 2px 0 0 0;

    font-style: italic;

  }

  .v-frame {
    border: 3px solid #3b0764;
    border-radius: 16px;

    box-shadow: 0 4px 0 #3b0764;
  }

  /* Custom warna pastel per-kotak menu kamu */
  .v-color-pink { background-color: #fbcfe8; }
  .v-color-orange { background-color: #fed7aa; }
  .v-color-green { background-color: #bbf7d0; }

  .v-slot-inside {
    width: 100%;
    height: 140px; /* Tinggi kotak potret */
    background: #ffffff;

    overflow: hidden;
  }

  .v-slot-inside canvas {

    text-align: center;

  }

  /* Area Tombol Aksi */
  .v-action-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .v-bubble-btn {

    border: 3px solid #3b0764;

  }

  .v-bubble-btn:active {
    transform: translateY(4px);
    box-shadow: 0 0px 0 #3b0764 !important;
  }

  .v-btn-blue { background-color: #bae6fd; color: #3b0764; box-shadow: 0 5px 0 #3b0764; }
  .v-btn-red { background-color: #f43f5e; color: white; box-shadow: 0 5px 0 #3b0764; } /* Tombol Putar Sekarang */
  .v-btn-yellow { background-color: #fef08a; color: #3b0764; box-shadow: 0 5px 0 #3b0764; } /* Tombol Pesan Menu */
  .v-btn-grey { background-color: #e2e8f0; color: #3b0764; box-shadow: 0 4px 0 #3b0764; }
</style>

<script>
  let vStream = null;
  let vCounter = 1;
  const vImagesStore = [];

  async function bukaVKamera() {
    const video = document.getElementById('v-video');
    const overlay = document.getElementById('v-overlay-text');
    
    try {
      vStream = await navigator.mediaDevices.getUserMedia({ 
        video: { width: 400, height: 500, facingMode: "user" }, 
        audio: false 
      });
      
      video.srcObject = vStream;
      overlay.style.display = 'none';
      
      document.getElementById('btn-v-start').style.display = 'none';
      const snapBtn = document.getElementById('btn-v-snap');
      snapBtn.style.display = 'block';
      snapBtn.innerText = `JEPRET FOTO ${vCounter}/3 ⚡`;
    } catch (err) {
      alert("Akses kamera bermasalah, tolong izinkan akses kamera ya kak! 😭");
    }
  }

  function jepretVFoto() {
    if (vCounter > 3) return;

    const video = document.getElementById('v-video');
    const canvas = document.getElementById(`v-canvas-${vCounter}`);
    const ctx = canvas.getContext('2d');

    canvas.width = 300;
    canvas.height = 360;

    // --- LOGIC ANTI-MIRROR PAS DISIMPAN ---
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    vImagesStore.push(canvas.toDataURL('image/png'));
    vCounter++;

    if (vCounter <= 3) {
      document.getElementById('btn-v-snap').innerText = `JEPRET FOTO ${vCounter}/3 ⚡`;
    } else {
      if (vStream) {
        vStream.getTracks().forEach(track => track.stop());
      }
      video.srcObject = null;
      document.getElementById('btn-v-snap').style.display = 'none';
      document.getElementById('btn-v-save').style.display = 'block';
      document.getElementById('btn-v-reset').style.display = 'block';
    }
  }

  function unduhVStrip() {
    const finalCanvas = document.getElementById('v-final-hidden-canvas');
    const ctx = finalCanvas.getContext('2d');

    // Canvas panjang memanjang vertikal
    finalCanvas.width = 360;
    finalCanvas.height = 1350;

    // Background ungu tua Cozee Corner
    ctx.fillStyle = "#3b0764";
    ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

    // Judul Header foto
    ctx.fillStyle = "#fef08a";
    ctx.font = "bold 24px 'Fredoka', sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("COZEE CORNER", finalCanvas.width / 2, 60);

    ctx.fillStyle = "#ffe4e6";
    ctx.font = "italic 15px 'Fredoka', sans-serif";
    ctx.fillText("sip, bite & relax", finalCanvas.width / 2, 90);

    let imagesLoaded = 0;
    const imgs = [];

    for (let i = 0; i < 3; i++) {
      const img = new Image();
      img.src = vImagesStore[i];
      imgs.push(img);

      img.onload = function() {
        imagesLoaded++;
        if (imagesLoaded === 3) {
          let currentY = 130;
          
          imgs.forEach((loadedImg) => {
            // Frame putih polaroid
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(25, currentY, 310, 360);
            
            // Cetak foto asli lurus (No-Mirror)
            ctx.drawImage(loadedImg, 35, currentY + 10, 290, 310);
            currentY += 380; // Turun ke bawah
          });

          // Teks Footer Nama Geng
          ctx.fillStyle = "#ffe4e6";
          ctx.font = "bold 11px 'Fredoka', sans-serif";
          ctx.fillText("mahmud • yuni • dyon • anjelina • lutfi • pradhita", finalCanvas.width / 2, finalCanvas.height - 40);

          // Unduh file hasil rakitan
          const dl = document.createElement('a');
          dl.download = 'cozee-photostrip-vertikal.png';
          dl.href = finalCanvas.toDataURL('image/png');
          dl.click();
        }
      };
    }
  }

  function resetVApp() {
    vCounter = 1;
    vImagesStore.length = 0;
    document.getElementById('btn-v-save').style.display = 'none';
    document.getElementById('btn-v-reset').style.display = 'none';
    document.getElementById('btn-v-start').style.display = 'block';
    document.getElementById('v-overlay-text').style.display = 'block';

    for (let i = 1; i <= 3; i++) {
      const canvas = document.getElementById(`v-canvas-${i}`);
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
</script>

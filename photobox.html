    <div class="sky-tracker-banner">
      <span>✨ COZEE PHOTOBOX STRIP ✨</span>
    </div>

    <div class="sky-camera-monitor">
      <video id="sky-video" autoplay playsinline></video>
      <div id="sky-overlay-text" class="sky-blink">
        TEKAN TOMBOL UNTUK AKTIFKAN KAMERA
      </div>
    </div>

    <div class="sky-preview-grid">
      <div class="sky-frame color-pink">
        <div class="sky-slot-inside">
          <canvas id="sky-canvas-1"></canvas>
          <span class="sky-number">01</span>
        </div>
        <div class="sky-caption">cozy vibes~</div>
      </div>

      <div class="sky-frame color-orange">
        <div class="sky-slot-inside">
          <canvas id="sky-canvas-2"></canvas>
          <span class="sky-number">02</span>
        </div>
        <div class="sky-caption">sip & relax</div>
      </div>

      <div class="sky-frame color-green">
        <div class="sky-slot-inside">
          <canvas id="sky-canvas-3"></canvas>
          <span class="sky-number">03</span>
        </div>
        <div class="sky-caption">bite some joy</div>
      </div>
    </div>

    <div class="sky-action-area">
      <button
        id="btn-sky-start"
        class="sky-bubble-btn btn-blue"
        onclick="bukaSkyKamera()"

        BUKA KAMERA 🎥
      </button>
      <button
        id="btn-sky-snap"
        class="sky-bubble-btn btn-red"
        onclick="jepretSkyFoto()"
        style="display: none"
      >
        JEPRET FOTO (0/3) ⚡
      </button>
      <button
        id="btn-sky-save"
        class="sky-bubble-btn btn-yellow"
        onclick="unduhSkyStrip()"
        style="display: none"
      >
        SIMPAN STRIP FOTO 💾
      </button>
      <button
        id="btn-sky-reset"
        class="sky-bubble-btn btn-grey"
        onclick="resetSkyApp()"
        style="display: none"
      >
        ULANGI FOTO 🔄
      </button>
    </div>

    <div class="sky-geng-footer">
      <p>with: mahmud • yuni • dyon • anjelina • lutfi • pradhita</p>
    </div>
  </div>
</div>

<canvas id="sky-final-hidden-canvas" style="display: none"></canvas>

<style>
  @import url("https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap");

  /* Background Biru Langit Gradasi persis seperti Screenshot kamu */
  .cozee-sky-section {
    width: 100%;
    min-height: 100vh;
    background-image: linear-gradient(to bottom, #93c5fd, #cffafe);
    font-family: "Fredoka", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px 12px;
    box-sizing: border-box;
  }

  /* Container utama melengkung border tebal ungu */
  .cozee-sky-container {
    background-color: #ffffff;
    border: 4px solid #3b0764;
    border-radius: 32px;
    padding: 20px;
    width: 100%;
    max-width: 430px;
    box-shadow: 0 12px 0px rgba(59, 7, 100, 0.2);
    box-sizing: border-box;
  }

  /* Header Brand style */
  .sky-top-brand {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .brand-badge {
    background: #ffffff;
    color: #3b0764;
    border: 3px solid #3b0764;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 4px 0 #3b0764;
  }

  .brand-slogan {
    font-size: 12px;
    color: #3b0764;
    font-style: italic;
    font-weight: 700;
  }

  /* Banner Tracker Style */
  .sky-tracker-banner {
    background: #ffffff;
    color: #3b0764;
    border: 3px dashed #3b0764;
    padding: 8px;
    text-align: center;
    border-radius: 20px;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 16px;
  }

  /* Monitor Jendela Kamera */
  .sky-camera-monitor {
    width: 100%;
    height: 240px;
    background-color: #1e1b4b;
    border: 4px solid #3b0764;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 0 rgba(59, 7, 100, 0.15);
  }

  #sky-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* Kaca cermin pas live preview */
  }

  .sky-blink {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fef08a;
    font-size: 12px;
    text-align: center;
    font-weight: 700;
  }

  /* 3 Preview Grid Berjejer */
  .sky-preview-grid {
    display: flex;
    gap: 8px;
    margin: 18px 0;
  }

  .sky-frame {
    flex: 1;
    border: 3px solid #3b0764;
    border-radius: 20px;
    padding: 6px 6px 14px 6px;
    box-shadow: 0 5px 0 #3b0764;
    display: flex;
    flex-direction: column;
  }

  /* Inject warna pastel box menu kamu */
  .color-pink {
    background-color: #fbcfe8;
  } /* Pink Lacak Orderan */
  .color-orange {
    background-color: #fed7aa;
  } /* Orange Daftar Menu */
  .color-green {
    background-color: #bbf7d0;
  } /* Hijau Buku Tamu */

  .sky-slot-inside {
    width: 100%;
    height: 110px;
    background: #ffffff;
    border: 2px solid #3b0764;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }

  .sky-slot-inside canvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .sky-number {
    position: absolute;
    top: 4px;
    left: 6px;
    font-size: 11px;
    color: #3b0764;

  }

  .sky-caption {
    font-size: 10px;
    text-align: center;
    color: #3b0764;

    margin-top: 6px;
  }

  /* Area Tombol Bubble Gendut Ambles */
  .sky-action-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .sky-bubble-btn {
    width: 100%;
    border: 3px solid #3b0764;
    padding: 12px;
    font-family: "Fredoka", sans-serif;

    transition: transform 0.05s ease;
  }

  .sky-bubble-btn:active {
    transform: translateY(4px);
    box-shadow: 0 0px 0 #3b0764 !important;
  }

  /* Varian warna tombol bubble */
  .btn-blue {
    background-color: #bae6fd;
    color: #3b0764;
    box-shadow: 0 5px 0 #3b0764;
  }
  .btn-red {
    background-color: #f43f5e;
    color: white;
    box-shadow: 0 5px 0 #3b0764;
  } /* Tombol putar roda */
  .btn-yellow {
    background-color: #fef08a;
    color: #3b0764;
    box-shadow: 0 5px 0 #3b0764;
  } /* Tombol pesan menu */
  .btn-grey {
    background-color: #e2e8f0;
    color: #3b0764;
    box-shadow: 0 4px 0 #3b0764;
  }

  /* Footer Geng */
  .sky-geng-footer {
    text-align: center;
    margin-top: 18px;
    border-top: 2px dashed #93c5fd;
    padding-top: 10px;
  }

  .sky-geng-footer p {
    margin: 0;
    font-size: 10.5px;
    color: #3b0764;
    opacity: 0.7;
    font-weight: 700;
  }
</style>

<script>
  let skyStream = null;
  let skyCounter = 1;
  const skyImagesStore = [];

  async function bukaSkyKamera() {
    const video = document.getElementById("sky-video");
    const overlay = document.getElementById("sky-overlay-text");

    try {
      skyStream = await navigator.mediaDevices.getUserMedia({
        video: { width: 400, height: 500, facingMode: "user" },
        audio: false,
      });

      video.srcObject = skyStream;
      overlay.style.display = "none";

      document.getElementById("btn-sky-start").style.display = "none";
      const snapBtn = document.getElementById("btn-sky-snap");
      snapBtn.style.display = "block";
      snapBtn.innerText = `JEPRET FOTO ${skyCounter}/3 ⚡`;
    } catch (err) {
      alert("Akses kamera bermasalah atau belum diizinkan, kak! 😭");
    }
  }

  function jepretSkyFoto() {
    if (skyCounter > 3) return;

    const video = document.getElementById("sky-video");
    const canvas = document.getElementById(`sky-canvas-${skyCounter}`);
    const ctx = canvas.getContext("2d");

    canvas.width = 300;
    canvas.height = 360;

    // --- FIX LOGIC BIAR FOTO GA MIRROR / GA KEBALIK PAS DISIMPAN ---
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.setTransform(1, 0, 0, 1, 0, 0); // Kembalikan koordinat normal

    skyImagesStore.push(canvas.toDataURL("image/png"));
    skyCounter++;

    if (skyCounter <= 3) {
      document.getElementById("btn-sky-snap").innerText =
        `JEPRET FOTO ${skyCounter}/3 ⚡`;
    } else {
      if (skyStream) {
        skyStream.getTracks().forEach((track) => track.stop());
      }
      video.srcObject = null;
      document.getElementById("btn-sky-snap").style.display = "none";
      document.getElementById("btn-sky-save").style.display = "block";
      document.getElementById("btn-sky-reset").style.display = "block";
    }
  }

  function unduhSkyStrip() {
    const finalCanvas = document.getElementById("sky-final-hidden-canvas");
    const ctx = finalCanvas.getContext("2d");

    finalCanvas.width = 360;
    finalCanvas.height = 1350;

    // Background strip ungu tua Cozee
    ctx.fillStyle = "#3b0764";
    ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

    // Judul strip
    ctx.fillStyle = "#fef08a";
    ctx.font = "bold 24px 'Fredoka', sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("COZEE CORNER", finalCanvas.width / 2, 60);

    ctx.fillStyle = "#ffe4e6";
    ctx.font = "italic 15px 'Fredoka', sans-serif";
    ctx.fillText("sip, bite & relax", finalCanvas.width / 2, 90);

    let imagesLoaded = 0;
    const imgs = [];

    for (let i = 0; i < 3; i++) {
      const img = new Image();
      img.src = skyImagesStore[i];
      imgs.push(img);

      img.onload = function () {
        imagesLoaded++;
        if (imagesLoaded === 3) {
          let currentY = 130;

          imgs.forEach((loadedImg) => {
            // Frame putih polaroid strip
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(25, currentY, 310, 360);

            // Gambar foto (Lurus anti-mirror)
            ctx.drawImage(loadedImg, 35, currentY + 10, 290, 310);
            currentY += 380;
          });

          // Footer strip nama geng
          ctx.fillStyle = "#ffe4e6";
          ctx.font = "bold 11px 'Fredoka', sans-serif";
          ctx.fillText(
            "mahmud • yuni • dyon • anjelina • lutfi • pradhita",
            finalCanvas.width / 2,
            finalCanvas.height - 40,
          );

          // Jalankan download otomatis
          const dl = document.createElement("a");
          dl.download = "cozee-photostrip.png";
          dl.href = finalCanvas.toDataURL("image/png");
          dl.click();
        }
      };
    }
  }

  function resetSkyApp() {
    skyCounter = 1;
    skyImagesStore.length = 0;
    document.getElementById("btn-sky-save").style.display = "none";
    document.getElementById("btn-sky-reset").style.display = "none";
    document.getElementById("btn-sky-start").style.display = "block";
    document.getElementById("sky-overlay-text").style.display = "block";

    for (let i = 1; i <= 3; i++) {
      const canvas = document.getElementById(`sky-canvas-${i}`);
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
</script>
